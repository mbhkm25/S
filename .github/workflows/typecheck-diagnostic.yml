name: Typecheck diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture TypeScript output
        shell: bash
        run: |
          set +e
          npm run lint > typecheck-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> typecheck-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-output
          path: typecheck-output.txt
          if-no-files-found: error
