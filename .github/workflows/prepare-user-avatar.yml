name: Prepare user profile avatar

on:
  push:
    branches:
      - feature/user-profile-avatar-v1

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/user-profile-avatar-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply avatar UI integration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          # types.ts
          path = Path('src/types.ts')
          text = path.read_text()
          text = text.replace("  governorate?: string | null;\n", "  governorate?: string | null;\n  avatar_path?: string | null;\n", 1)
          path.write_text(text)

          # App.tsx
          path = Path('src/App.tsx')
          text = path.read_text()
          text = text.replace("import { isBasicProfileComplete } from './lib/profileUtils';\n", "import { isBasicProfileComplete } from './lib/profileUtils';\nimport { getUserAvatarUrl } from './lib/userAvatar';\n")
          old = '''                    <div className="w-6.5 h-6.5 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold text-[10px]">
                      {profile ? (profile.full_name?.slice(0, 1) || 'أ') : '...'}
                    </div>'''
          new = '''                    <button type="button" onClick={() => navigateTo('profile')} className="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full bg-slate-900 text-white ring-2 ring-white shadow-sm" aria-label="فتح حسابي">
                      {profile?.avatar_path ? (
                        <img src={getUserAvatarUrl(profile.avatar_path)} alt={profile.full_name || 'صورة المستخدم'} className="h-full w-full object-cover" />
                      ) : (
                        <span className="text-sm font-bold">{profile ? (profile.full_name?.slice(0, 1) || 'أ') : '...'}</span>
                      )}
                    </button>'''
          if old not in text: raise SystemExit('App avatar block not found')
          text = text.replace(old, new, 1)
          path.write_text(text)

          # Auth.tsx
          path = Path('src/components/Auth.tsx')
          text = path.read_text()
          text = text.replace("import React, { useState } from 'react';", "import React, { useEffect, useState } from 'react';")
          text = text.replace("import { Lock, Mail, User, AlertCircle, CheckCircle2, Loader2, Sparkles } from 'lucide-react';", "import { Lock, Mail, User, AlertCircle, CheckCircle2, Loader2, Sparkles, Camera } from 'lucide-react';")
          text = text.replace("import { logAuthDiagnostic } from '../lib/authDiagnostics';\n", "import { logAuthDiagnostic } from '../lib/authDiagnostics';\nimport { uploadUserAvatar } from '../lib/userAvatar';\n")
          text = text.replace("  const [governorate, setGovernorate] = useState('');\n", "  const [governorate, setGovernorate] = useState('');\n  const [avatarFile, setAvatarFile] = useState<File | null>(null);\n  const [avatarPreview, setAvatarPreview] = useState('');\n")
          text = text.replace("  // Translate standard Supabase auth/db errors", "  useEffect(() => {\n    if (!avatarFile) { setAvatarPreview(''); return; }\n    const url = URL.createObjectURL(avatarFile);\n    setAvatarPreview(url);\n    return () => URL.revokeObjectURL(url);\n  }, [avatarFile]);\n\n  // Translate standard Supabase auth/db errors")
          text = text.replace("          const userProfile = await ensureProfileExists(authData.user);\n          setSuccessMessage('تم إنشاء الحساب بنجاح!');", "          let userProfile = await ensureProfileExists(authData.user);\n          if (avatarFile) {\n            const avatarPath = await uploadUserAvatar(authData.user.id, avatarFile);\n            const { data: updatedProfile, error: avatarError } = await supabase.from('profiles').update({ avatar_path: avatarPath, updated_at: new Date().toISOString() }).eq('id', authData.user.id).select().single();\n            if (avatarError) throw avatarError;\n            userProfile = updatedProfile as Profile;\n          }\n          setSuccessMessage('تم إنشاء الحساب بنجاح!');")
          marker = "              {/* Full Name */}"
          avatar_ui = '''              <div className="flex items-center gap-4 rounded-2xl bg-slate-50 p-4">
                <label className="relative flex h-16 w-16 shrink-0 cursor-pointer items-center justify-center overflow-hidden rounded-2xl bg-white text-slate-500 shadow-sm">
                  {avatarPreview ? <img src={avatarPreview} alt="معاينة صورة البروفايل" className="h-full w-full object-cover" /> : <Camera className="h-6 w-6" />}
                  <input type="file" accept="image/jpeg,image/png,image/webp" className="sr-only" onChange={(event) => setAvatarFile(event.target.files?.[0] || null)} />
                </label>
                <div className="min-w-0"><p className="text-xs font-bold text-slate-800">صورة البروفايل <span className="font-normal text-slate-400">(اختيارية)</span></p><p className="mt-1 text-[10px] leading-5 text-slate-500">يمكنك تخطيها وإضافتها لاحقًا من حسابي.</p>{avatarFile && <button type="button" onClick={() => setAvatarFile(null)} className="mt-1 text-[10px] font-bold text-rose-600">إزالة الصورة</button>}</div>
              </div>

'''
          text = text.replace(marker, avatar_ui + marker, 1)
          path.write_text(text)

          # ProfileV2.tsx
          path = Path('src/components/ProfileV2.tsx')
          text = path.read_text()
          text = text.replace("  User\n} from 'lucide-react';", "  User,\n  Camera,\n  ImagePlus\n} from 'lucide-react';")
          text = text.replace("import { getAppPublicInformation, type AppPublicInformation } from '../lib/appPublicInformation';\n", "import { getAppPublicInformation, type AppPublicInformation } from '../lib/appPublicInformation';\nimport { getUserAvatarUrl, removeUserAvatar, uploadUserAvatar } from '../lib/userAvatar';\n")
          text = text.replace("  const [profileError, setProfileError] = useState<string | null>(null);\n", "  const [profileError, setProfileError] = useState<string | null>(null);\n  const [savingAvatar, setSavingAvatar] = useState(false);\n  const avatarInputRef = useRef<HTMLInputElement | null>(null);\n")
          insert_before = "  const handleAddAccount = async (event: React.FormEvent) => {"
          handlers = '''  const handleAvatarChange = async (event: React.ChangeEvent<HTMLInputElement>) => {
    const file = event.target.files?.[0];
    event.target.value = '';
    if (!file || savingAvatar) return;
    setProfileError(null);
    setProfileSuccess(null);
    setSavingAvatar(true);
    try {
      const newPath = await uploadUserAvatar(user.id, file);
      const previousPath = profile.avatar_path;
      const { error } = await supabase.from('profiles').update({ avatar_path: newPath, updated_at: new Date().toISOString() }).eq('id', user.id);
      if (error) throw error;
      await refreshProfile();
      if (previousPath) await removeUserAvatar(previousPath).catch(() => undefined);
      setProfileSuccess('تم تحديث صورة البروفايل.');
    } catch (error) {
      const message = error instanceof Error && error.message === 'avatar_too_large' ? 'حجم الصورة يجب ألا يتجاوز 5 ميجابايت.' : 'تعذر رفع صورة البروفايل الآن.';
      setProfileError(message);
    } finally {
      setSavingAvatar(false);
    }
  };

  const handleRemoveAvatar = async () => {
    if (!profile.avatar_path || savingAvatar || !window.confirm('هل تريد حذف صورة البروفايل؟')) return;
    setSavingAvatar(true);
    setProfileError(null);
    try {
      const previousPath = profile.avatar_path;
      const { error } = await supabase.from('profiles').update({ avatar_path: null, updated_at: new Date().toISOString() }).eq('id', user.id);
      if (error) throw error;
      await refreshProfile();
      await removeUserAvatar(previousPath).catch(() => undefined);
      setProfileSuccess('تم حذف صورة البروفايل.');
    } catch {
      setProfileError('تعذر حذف صورة البروفايل الآن.');
    } finally {
      setSavingAvatar(false);
    }
  };

'''
          text = text.replace(insert_before, handlers + insert_before, 1)
          old_avatar = '<div className="flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-slate-950 text-white"><User className="h-6 w-6" /></div>'
          new_avatar = '''<button type="button" onClick={() => navigateSection('personal')} className="flex h-16 w-16 shrink-0 items-center justify-center overflow-hidden rounded-2xl bg-slate-950 text-white ring-2 ring-white shadow-md" aria-label="تعديل صورة البروفايل">{profile.avatar_path ? <img src={getUserAvatarUrl(profile.avatar_path)} alt={profile.full_name || 'صورة المستخدم'} className="h-full w-full object-cover" /> : <User className="h-7 w-7" />}</button>'''
          if old_avatar not in text: raise SystemExit('Profile overview avatar not found')
          text = text.replace(old_avatar, new_avatar, 1)
          personal_start = '<div className="space-y-4 pb-24"><SubpageHeader title="البيانات الشخصية" /><form id="personal-data-form"'
          personal_replacement = '''<div className="space-y-4 pb-24"><SubpageHeader title="البيانات الشخصية" />
      <section className="flex items-center gap-4 rounded-[1.7rem] bg-white p-4 shadow-sm">
        <button type="button" onClick={() => avatarInputRef.current?.click()} disabled={savingAvatar} className="relative flex h-20 w-20 shrink-0 items-center justify-center overflow-hidden rounded-2xl bg-slate-950 text-white disabled:opacity-60">
          {profile.avatar_path ? <img src={getUserAvatarUrl(profile.avatar_path)} alt={profile.full_name || 'صورة المستخدم'} className="h-full w-full object-cover" /> : <ImagePlus className="h-7 w-7" />}
          <span className="absolute bottom-1 left-1 flex h-7 w-7 items-center justify-center rounded-full bg-white text-slate-800 shadow"><Camera className="h-3.5 w-3.5" /></span>
        </button>
        <div className="min-w-0 flex-1"><h3 className="text-sm font-bold">صورة البروفايل</h3><p className="mt-1 text-[11px] leading-5 text-slate-500">اختيارية ولا تؤثر على اكتمال الحساب أو استخدام مزايا سند.</p><div className="mt-2 flex gap-2"><button type="button" disabled={savingAvatar} onClick={() => avatarInputRef.current?.click()} className="rounded-lg bg-slate-100 px-3 py-2 text-[10px] font-bold">{savingAvatar ? 'جاري الحفظ...' : profile.avatar_path ? 'استبدال' : 'إضافة صورة'}</button>{profile.avatar_path && <button type="button" disabled={savingAvatar} onClick={handleRemoveAvatar} className="rounded-lg bg-rose-50 px-3 py-2 text-[10px] font-bold text-rose-600">حذف</button>}</div></div>
        <input ref={avatarInputRef} type="file" accept="image/jpeg,image/png,image/webp" className="sr-only" onChange={handleAvatarChange} />
      </section>
      <form id="personal-data-form"'''
          if personal_start not in text: raise SystemExit('Personal section start not found')
          text = text.replace(personal_start, personal_replacement, 1)
          path.write_text(text)
          PY
      - run: npm run lint
      - run: npm run build
      - name: Commit generated avatar integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/App.tsx src/components/Auth.tsx src/components/ProfileV2.tsx
          git commit -m "Integrate optional user profile avatars"
          git push origin HEAD:feature/user-profile-avatar-v1
