name: Prepare business Aurora integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/home-business-aurora-background
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install OGL and update lockfile
        run: npm install ogl@1.0.11 --save

      - name: Wrap Sanad Business in full-bleed Aurora background
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/components/Home.tsx')
          text = path.read_text(encoding='utf-8')

          text = text.replace("import { FINANCIAL_ENTITIES } from '../lib/financialEntities';\n", '')
          text = text.replace("import LogoLoop from './effects/LogoLoop';\n", "import Aurora from './effects/Aurora';\n")

          logos = """const financialLogos = FINANCIAL_ENTITIES.map((entity) => ({
            src: entity.logo,
            alt: entity.nameAr,
            title: entity.nameAr
          }));

          """
          text = text.replace(logos, '')

          old = """      <div className=\"overflow-hidden rounded-[1.25rem] border-y border-slate-200/70 bg-[#f7f8fa] py-1\">
                <LogoLoop
                  logos={financialLogos}
                  speed={32}
                  direction=\"left\"
                  logoHeight={28}
                  gap={24}
                  fadeOut
                  fadeOutColor=\"#f7f8fa\"
                />
              </div>

              <section className=\"space-y-4\" aria-labelledby=\"business-sanad-title\">
          """
          new = """      <section
                className=\"relative -mx-2 overflow-hidden rounded-t-[2rem] pb-8 pt-7 sm:-mx-4\"
                aria-labelledby=\"business-sanad-title\"
              >
                <Aurora
                  colorStops={['#bbf7d0', '#bfdbfe', '#c7d2fe']}
                  blend={0.78}
                  amplitude={0.52}
                  speed={0.18}
                />
                <div className=\"relative z-10 space-y-4 px-2 sm:px-4\">
          """
          if old not in text:
              raise SystemExit('Could not find the existing divider/business section block')
          text = text.replace(old, new, 1)

          closing = """        )}
              </section>
            </div>
          );
          }
          """
          replacement = """        )}
                </div>
              </section>
            </div>
          );
          }
          """
          if closing not in text:
              raise SystemExit('Could not find final business section closing block')
          text = text.replace(closing, replacement, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify generated changes
        run: |
          npm run lint
          npm run build

      - name: Commit generated dependency and layout changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/components/Home.tsx
          git commit -m "Apply full-bleed Aurora background to Sanad Business"
          git push origin HEAD:feature/home-business-aurora-background
