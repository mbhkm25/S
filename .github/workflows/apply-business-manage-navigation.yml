name: Apply business management navigation

on:
  push:
    branches:
      - feature/business-customer-management-v1
    paths:
      - scripts/apply-business-manage-navigation.mjs
      - .github/workflows/apply-business-manage-navigation.yml
      - src/components/business/BusinessManageNavigation.tsx

permissions:
  contents: write

jobs:
  apply-navigation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/business-customer-management-v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply codemod
        run: node scripts/apply-business-manage-navigation.mjs
      - name: Commit generated integration
        run: |
          if git diff --quiet; then
            echo "No navigation changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/business/BusinessManage.tsx
          git commit -m "Integrate responsive business management navigation"
          git push origin HEAD:feature/business-customer-management-v1
