name: Patch report delivery tracking

on:
  push:
    branches:
      - feature/business-customer-management-v1
    paths:
      - scripts/patch-report-delivery-tracking.mjs
      - .github/workflows/patch-report-delivery-tracking.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/business-customer-management-v1
          fetch-depth: 0
      - run: node scripts/patch-report-delivery-tracking.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Track accepted and failed report delivery states"
          git push origin HEAD:feature/business-customer-management-v1
