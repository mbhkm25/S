name: Production quality gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run lint > typecheck.log 2>&1
          exit_code=$?
          cat typecheck.log
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce type-check result
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

      - name: Build production PWA
        run: npm run build -- --mode production

      - name: Build Android assets
        run: npm run build:android

      - name: Reject obsolete operational verification URLs
        shell: bash
        run: |
          set -Eeuo pipefail
          if grep -RInE --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist \
            'https://sanadflow\.com/v/|/app/v/' .; then
            echo 'Obsolete operational verification URL detected.' >&2
            exit 1
          fi

      - name: Verify tracked Edge Function sources
        shell: bash
        run: |
          set -Eeuo pipefail
          functions=(
            sanad-file-access
            sanad-pro-payment-verify
            sanad-v3-analyze-operation
            sanad-v3-app-trigger-analysis
            sanad-v3-app-trigger-notify-verification
            sanad-v3-app-trigger-pro-payment-verify
            sanad-v3-app-trigger-report
            sanad-v3-business-actions
            sanad-v3-notify-verification
            sanad-v3-process-report
            sanad-v3-retry-report-delivery
            sanad-v3-whatsapp-intake
          )

          for function_name in "${functions[@]}"; do
            test -s "supabase/functions/${function_name}/index.ts" || {
              echo "Missing Edge Function source: ${function_name}" >&2
              exit 1
            }
          done

      - name: Verify SQL migration formatting
        run: git diff --check
