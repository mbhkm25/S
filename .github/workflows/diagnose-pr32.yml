name: Diagnose PR32 TypeScript

on:
  push:
    branches:
      - feature/home-actions-profile-polish

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/home-actions-profile-polish
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture TypeScript output
        shell: bash
        run: |
          set +e
          npm run lint > pr32-tsc.log 2>&1
          STATUS=$?
          cat pr32-tsc.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr32-tsc.log
          git commit -m "Capture PR32 TypeScript diagnostics" || true
          git push origin HEAD:feature/home-actions-profile-polish
          exit $STATUS
