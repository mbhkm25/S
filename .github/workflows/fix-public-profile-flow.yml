name: Fix public profile flow

on:
  push:
    branches:
      - feature/business-customer-management-v1
    paths:
      - .github/workflows/fix-public-profile-flow.yml

permissions:
  contents: write

jobs:
  apply-flow-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/business-customer-management-v1
          fetch-depth: 0

      - name: Apply public profile flow fix
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/business/PublicBusinessProfile.tsx')
          text = path.read_text(encoding='utf-8')

          old = "const [mode, setMode] = useState<ProfileMode>(initialTab ? 'details' : 'intro');"
          new = "const [mode, setMode] = useState<ProfileMode>(initialTab && initialTab !== 'overview' ? 'details' : 'intro');"
          if old not in text:
              raise SystemExit('initial mode anchor not found')
          text = text.replace(old, new, 1)

          old = """  useEffect(() => {
    if (!initialTab) return;
    setSection(normalizeInitialSection(initialTab));
    setMode('details');
  }, [initialTab]);"""
          new = """  useEffect(() => {
    if (!initialTab || initialTab === 'overview') return;
    setSection(normalizeInitialSection(initialTab));
    setMode('details');
  }, [initialTab]);"""
          if old not in text:
              raise SystemExit('initial tab effect anchor not found')
          text = text.replace(old, new, 1)

          anchor = """  const handleJoin = async () => {
    if (!profile || isCustomer) return;
    setLinking(true);
    setError(null);
    try {
      await joinBusinessAsCustomer(profile.id, 'public_profile');
      setIsCustomer(true);
    } catch (caught) {
      setError(caught instanceof Error ? caught.message : 'تعذر الارتباط بالنشاط.');
    } finally {
      setLinking(false);
    }
  };"""
          addition = anchor + """

  const openDetails = () => {
    window.history.pushState(
      { ...(window.history.state || {}), sanadPublicProfileMode: 'details' },
      '',
      window.location.href
    );
    setMode('details');
    setSection('overview');
    setSectionMenuOpen(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const returnToIntro = () => {
    if (window.history.state?.sanadPublicProfileMode === 'details') {
      window.history.back();
      return;
    }
    setMode('intro');
    setSection('overview');
    setSectionMenuOpen(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const leavePublicProfile = () => {
    if (window.history.length > 1) {
      window.history.back();
      return;
    }
    onNavigate('business-community');
  };

  useEffect(() => {
    const handleProfilePopState = () => {
      if (mode === 'details') {
        setMode('intro');
        setSection('overview');
        setSectionMenuOpen(false);
        window.scrollTo({ top: 0, behavior: 'auto' });
      }
    };
    window.addEventListener('popstate', handleProfilePopState);
    return () => window.removeEventListener('popstate', handleProfilePopState);
  }, [mode]);"""
          if anchor not in text:
              raise SystemExit('handleJoin anchor not found')
          text = text.replace(anchor, addition, 1)

          replacements = {
            "onClick={() => onNavigate('business-community')}\n            className=\"absolute right-4 top-4": "onClick={leavePublicProfile}\n            className=\"absolute right-4 top-4",
            "onClick={() => setMode('details')}\n                className=\"flex items-center justify-center": "onClick={openDetails}\n                className=\"flex items-center justify-center",
            "<button type=\"button\" onClick={() => setMode('intro')} className=\"rounded-xl border": "<button type=\"button\" onClick={returnToIntro} className=\"rounded-xl border",
          }
          for old_value, new_value in replacements.items():
              if old_value not in text:
                  raise SystemExit(f'navigation anchor not found: {old_value[:60]}')
              text = text.replace(old_value, new_value, 1)

          path.write_text(text, encoding='utf-8')

          jsx_key = Path('src/types/react-jsx-key.d.ts')
          if jsx_key.exists():
              jsx_key.unlink()

      - name: Verify TypeScript
        run: npm ci && npm run lint

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/business/PublicBusinessProfile.tsx src/types/react-jsx-key.d.ts
          git commit -m "Correct public profile entry and back navigation flow"
          git push origin HEAD:feature/business-customer-management-v1
