name: Fix public business profile key typing

on:
  push:
    branches:
      - feature/business-customer-management-v1

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/business-customer-management-v1
          fetch-depth: 0

      - name: Apply source-level typing fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/business/PublicBusinessProfile.tsx')
          text = path.read_text(encoding='utf-8')
          old = """}: {\n  item: CatalogItem;\n  businessSlug: string;\n  businessName: string;\n  whatsapp: string;\n  onNavigate: (page: string, token?: string) => void;\n}) {"""
          new = """}: {\n  key?: string | number;\n  item: CatalogItem;\n  businessSlug: string;\n  businessName: string;\n  whatsapp: string;\n  onNavigate: (page: string, token?: string) => void;\n}) {"""
          if old not in text:
              raise SystemExit('Expected CatalogItemCard props block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          compatibility = Path('src/types/react-jsx-key.d.ts')
          if compatibility.exists():
              compatibility.unlink()
          PY

      - name: Commit the fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/business/PublicBusinessProfile.tsx src/types/react-jsx-key.d.ts
          git diff --cached --check
          git commit -m "Fix catalog card key typing at source [skip ci]"
          git push origin HEAD:feature/business-customer-management-v1
